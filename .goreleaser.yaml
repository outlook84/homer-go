version: 2

project_name: homer-go

before:
  hooks:
    - go mod tidy

builds:
  - id: homer-go-linux-amd64
    main: .
    binary: homer-go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.buildID={{ .Version }}

  - id: homer-go-linux-arm64
    main: .
    binary: homer-go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.buildID={{ .Version }}

  - id: homer-go-desktop
    main: .
    binary: homer-go
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.buildID={{ .Version }}

archives:
  - id: homer-go
    ids:
      - homer-go-linux-amd64
      - homer-go-linux-arm64
      - homer-go-desktop
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - assets/config.yml

dockers_v2:
  - id: homer-go
    ids:
      - homer-go-linux-amd64
      - homer-go-linux-arm64
    dockerfile: Dockerfile
    images:
      - "ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/{{ .ProjectName }}"
    tags:
      - "{{ .Tag }}"
      - "{{ .Major }}.{{ .Minor }}"
      - latest
    labels:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.name": "{{ .ProjectName }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.version": "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
